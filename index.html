<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>삼영건강증진회 Master</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <style>
        :root { --primary: #5da3d9; --danger: #e66755; --success: #5cc97e; --bg: #f2f4f7; --text: #333; --working: #eef7ff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); -webkit-tap-highlight-color: transparent; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .header-banner { background: linear-gradient(135deg, #5da3d9, #5cc97e); padding: 15px; border-radius: 18px; color: white; text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 1rem; }
        .timer-box { border: 1px dashed var(--danger); background: #fff9f9; padding: 6px; border-radius: 12px; text-align: center; color: var(--danger); font-weight: bold; font-size: 0.75rem; margin-bottom: 12px; }

        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 15px; }
        .day-card { background: #f8f9fa; border: 1px solid #eee; border-radius: 10px; padding: 8px 0; text-align: center; cursor: pointer; }
        .day-card b { font-size: 0.7rem; display: block; }
        .day-card span { font-size: 0.65rem; color: #999; }
        .day-card.selected { background: var(--primary); border-color: var(--primary); color: white; }
        .day-card.selected span { color: rgba(255,255,255,0.8); }
        .day-card.today { border: 1.5px solid var(--success); }

        .input-group { display: flex; gap: 6px; margin-bottom: 12px; }
        select { flex: 1.5; padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-weight: bold; font-size: 0.9rem; }
        .btn { flex: 1; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-start { background: var(--primary); }
        .btn-end { background: var(--danger); }

        .table-wrapper { overflow-x: auto; margin-bottom: 12px; border-radius: 16px; border: 1px solid #f0f0f0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 380px; }
        th { padding: 10px 4px; background: #fafafa; color: #888; }
        td { padding: 12px 4px; border-bottom: 1px solid #f9f9f9; text-align: center; }
        tr.is-working { background-color: var(--working) !important; }
        
        .day-badge { width: 20px; height: 20px; line-height: 20px; border-radius: 50%; background: #f0f0f0; color: #ccc; font-size: 8px; font-weight: bold; display: inline-block; margin: 0 1px; }
        .day-badge.active { background: var(--success); color: white; }
        .day-badge.ing { background: var(--primary); color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .summary-box { background: #f8f9fa; padding: 12px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-around; text-align: center; border: 1px solid #eee; }
        .summary-item b { display: block; font-size: 0.95rem; margin-top: 2px; }

        .mini-menu { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .btn-mini { padding: 5px 10px; font-size: 0.7rem; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #777; cursor: pointer; }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center; }

        /* 리포트 레이어 */
        .full-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #eee; border: 1px solid #eee; margin-top: 10px; }
        .cal-day-head { background: #f8f9fa; padding: 5px; text-align: center; font-size: 0.7rem; font-weight: bold; color: #999; }
        .cal-cell { background: white; min-height: 55px; padding: 4px; font-size: 0.65rem; }
        .cal-member-tag { background: #eef7ff; color: #5da3d9; padding: 1px 2px; border-radius: 3px; display: block; margin-bottom: 1px; font-size: 0.55rem; white-space: nowrap; overflow: hidden; }

        /* [추가] 지난주 벌금 리스트 */
        .last-week-list { margin-top: 20px; padding: 15px; background: #fff5f5; border-radius: 16px; border: 1px solid #ffe3e3; }
        .last-week-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffeded; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="actionModal" class="modal">
    <div class="modal-box">
        <h3 id="actionTitle">운동 시작! 🔥</h3>
        <p id="actionMsg">사진을 선택하면 카톡방으로 공유됩니다.</p>
        <label style="display:block; margin: 15px 0;"><input type="checkbox" id="confirmCheck"> 확인했습니다.</label>
        <button id="actionConfirmBtn" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:12px; font-weight:bold;">사진 선택 및 저장</button>
        <button onclick="closeActionModal()" style="margin-top:10px; border:none; background:none; color:#999; font-size:0.8rem;">취소</button>
    </div>
</div>

<div id="historyView" class="full-layer">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; font-size:1.1rem;">📅 운동 리포트</h2>
        <button onclick="toggleView('historyView', false)" style="border:none; background:#eee; padding:6px 12px; border-radius:8px; font-weight:bold; font-size:0.8rem;">닫기</button>
    </div>
    <div class="cal-grid" id="calendarGrid"></div>

    <div class="last-week-list">
        <h4 style="margin:0 0 10px 0; color:var(--danger);">⚠️ 지난주 벌금 정산</h4>
        <div id="lastWeekContent"></div>
    </div>
</div>

<div class="container">
    <div class="header-banner"><span id="mainTitle">로드 중...</span></div>
    <div class="timer-box" id="timerDisplay">D-Day 계산 중...</div>
    <div class="week-grid" id="weekSelector"></div>

    <div class="input-group">
        <select id="nameSelect"><option value="">이름 선택</option></select>
        <button class="btn btn-start" onclick="openActionModal('START')">시작</button>
        <button class="btn btn-end" onclick="openActionModal('END')">종료</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>순위</th><th>이름</th><th>주간 현황</th><th>회</th><th>벌금</th></tr></thead>
            <tbody id="statTable"></tbody>
        </table>
    </div>

    <div class="summary-box">
        <div class="summary-item" style="color:var(--danger)"><span>주간 벌금</span><b id="totalWeekFine">0원</b></div>
        <div class="summary-item" style="color:var(--primary)"><span>월간 적립</span><b id="totalMonthSave">0원</b></div>
    </div>

    <div class="mini-menu">
        <button class="btn-mini" onclick="toggleView('historyView', true)">📊 리포트</button>
        <button class="btn-mini" onclick="downloadCSV()">💾 CSV 백업</button>
        <button class="btn-mini" onclick="document.getElementById('csvUpload').click()">📥 CSV 복구</button>
        <button class="btn-mini" onclick="resetData()">⚙️ 초기화</button>
    </div>
    <input type="file" id="csvUpload" accept=".csv" style="display:none;" onchange="importCSV(this)">
    <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="processFinalSave()">
</div>

<script>
    const config = {
        apiKey: "AIzaSyDHmxYjI0bp55jDuBYFFI5fA81BXx_u2Mg",
        databaseURL: "https://samyoung-61ed1-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "samyoung-61ed1"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    const dataPath = db.ref('sy_master_v14'); 

    if (!Kakao.isInitialized()) Kakao.init('586678c7f1fd7c2d42c3f3b922499b65');

    const members = ["우은미", "이계주", "김재현", "김종엽", "서호진", "이송희", "정환균", "황재균"];
    let selectedDate = new Date().toISOString().split('T')[0];
    let allData = [];
    let pendingAction = null;

    function init() {
        const sel = document.getElementById('nameSelect');
        members.forEach(m => { sel.innerHTML += `<option value="${m}">${m}</option>`; });
        renderWeekCards();
        updateHeaderTitle();
        dataPath.on('value', snap => {
            allData = snap.val() || [];
            renderTable(allData);
            renderCalendar();
            renderLastWeekFine();
        });
        setInterval(tick, 1000);
    }

    // [로직] 카톡 공유 함수
    function sendKakaoShare(name, type, time) {
        if (!Kakao.isInitialized()) return;
        const msg = type === 'START' ? `운동 시작! 🔥 (50분 도전)` : `운동 완료! 💪 (기록: ${time})`;
        Kakao.Share.sendDefault({
            objectType: 'feed',
            content: {
                title: `🏋️ ${name}님 ${type === 'START' ? '시작' : '완료'}`,
                description: msg,
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/3048/3048398.png',
                link: { mobileWebUrl: window.location.href, webUrl: window.location.href }
            },
            buttons: [{ title: '현황 보기', link: { mobileWebUrl: window.location.href, webUrl: window.location.href } }]
        });
    }

    function openActionModal(type) {
        const name = document.getElementById('nameSelect').value;
        if(!name) return alert("이름을 선택하세요!");
        const idx = allData.findIndex(r => r.name === name && r.date === selectedDate);
        pendingAction = { type, name, idx };
        document.getElementById('confirmCheck').checked = false;

        if(type === 'START') {
            if(idx > -1) return alert("이미 기록이 있습니다.");
            document.getElementById('actionTitle').innerText = "운동 시작! 🔥";
            document.getElementById('actionMsg').innerHTML = "사진을 선택하면 카톡방 공유 후<br>50분 타이머가 시작됩니다!";
        } else {
            if(idx === -1) return alert("시작을 먼저 하세요!");
            if(allData[idx].end) return alert("이미 종료되었습니다.");
            const start = new Date(`${selectedDate} ${allData[idx].start}`);
            const diff = Math.floor((new Date() - start) / 60000);
            document.getElementById('actionTitle').innerText = "운동 완료! 💪";
            document.getElementById('actionMsg').innerHTML = diff < 50 ? `<b style='color:red'>경고: ${diff}분밖에 안됐습니다!</b><br>그래도 종료할까요?` : `${diff}분간 고생하셨습니다!`;
        }
        document.getElementById('actionModal').style.display = 'flex';
    }

    document.getElementById('actionConfirmBtn').onclick = () => {
        if(!document.getElementById('confirmCheck').checked) return alert("확인 체크를 해주세요!");
        document.getElementById('photoInput').click(); // 사진 선택창 열기
    };

    async function processFinalSave() {
        const { type, name, idx } = pendingAction;
        const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        let list = [...allData];

        if(type === 'START') {
            list.push({ name, date: selectedDate, start: time, end: "" });
            sendKakaoShare(name, 'START', time);
        } else {
            list[idx].end = time;
            const diff = Math.floor((new Date() - new Date(`${selectedDate} ${list[idx].start}`)) / 60000);
            sendKakaoShare(name, 'END', `${diff}분`);
        }
        await dataPath.set(list);
        closeActionModal();
    }

    function closeActionModal() { document.getElementById('actionModal').style.display = 'none'; }

    // [요청] 지난주 벌금 계산
    function renderLastWeekFine() {
        const now = new Date();
        const lastMon = new Date();
        lastMon.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1) - 7);
        const lastSun = new Date(lastMon); lastSun.setDate(lastMon.getDate() + 6);
        
        const startStr = lastMon.toISOString().split('T')[0];
        const endStr = lastSun.toISOString().split('T')[0];

        let html = "";
        members.forEach(m => {
            const cnt = allData.filter(d => d.name === m && d.date >= startStr && d.date <= endStr && d.end).length;
            const fine = cnt >= 3 ? 0 : (cnt === 2 ? 1000 : (cnt === 1 ? 3000 : 5000));
            if(fine > 0) html += `<div class="last-week-item"><span>${m} (${cnt}회)</span><b>${fine.toLocaleString()}원</b></div>`;
        });
        document.getElementById('lastWeekContent').innerHTML = html || "<div style='text-align:center; color:#999;'>지난주 벌금 대상자 없음! 🎉</div>";
    }

    // --- 나머지 렌더링 함수들 ---
    function renderTable(data) {
        const now = new Date();
        const startDay = now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1);
        const monStr = new Date(new Date().setDate(startDay)).toISOString().split('T')[0];
        const todayStr = new Date().toISOString().split('T')[0];
        let weekFineTotal = 0;

        const summary = members.map(m => {
            const wLogs = data.filter(d => d.name === m && d.date >= monStr && d.end);
            const isWorking = data.find(d => d.name === m && d.date === todayStr && !d.end);
            const dBit = [0,0,0,0,0,0,0];
            wLogs.forEach(l => { dBit[(new Date(l.date).getDay() + 6) % 7] = 1; });
            const cnt = wLogs.length;
            const fine = cnt >= 3 ? 0 : (cnt === 2 ? 1000 : (cnt === 1 ? 3000 : 5000));
            weekFineTotal += fine;
            return { name: m, cnt, fine, dBit, isWorking };
        }).sort((a,b) => b.cnt - a.cnt);

        document.getElementById('totalWeekFine').innerText = weekFineTotal.toLocaleString() + "원";
        let html = "";
        summary.forEach((s, i) => {
            const badges = ['월','화','수','목','금','토','일'].map((n, idx) => {
                let cls = s.dBit[idx] ? "day-badge active" : (s.isWorking && idx === (new Date().getDay()+6)%7 ? "day-badge ing" : "day-badge");
                return `<div class="${cls}">${cls.includes('ing') ? 'ing' : n}</div>`;
            }).join('');
            html += `<tr class="${s.isWorking ? 'is-working' : ''}"><td>${i+1}</td><td>${s.name}</td><td>${badges}</td><td>${s.cnt}</td><td style="color:var(--danger)">${s.fine}</td></tr>`;
        });
        document.getElementById('statTable').innerHTML = html;
    }

    function renderWeekCards() {
        const container = document.getElementById('weekSelector');
        const startDay = new Date(); startDay.setDate(new Date().getDate() - (new Date().getDay() === 0 ? 6 : new Date().getDay() - 1));
        container.innerHTML = '';
        for(let i=0; i<7; i++) {
            const d = new Date(startDay); d.setDate(startDay.getDate() + i);
            const ds = d.toISOString().split('T')[0];
            const div = document.createElement('div');
            div.className = `day-card ${ds === selectedDate ? 'selected' : ''} ${ds === new Date().toISOString().split('T')[0] ? 'today' : ''}`;
            div.innerHTML = `<b>${['월','화','수','목','금','토','일'][i]}</b><span>${d.getDate()}</span>`;
            div.onclick = () => { selectedDate = ds; renderWeekCards(); };
            container.appendChild(div);
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const lastDate = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        let html = ['일','월','화','수','목','금','토'].map(d => `<div class="cal-day-head">${d}</div>`).join('');
        for(let i=0; i<firstDay; i++) html += `<div class="cal-cell"></div>`;
        for(let d=1; d<=lastDate; d++) {
            const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const tags = allData.filter(r => r.date === ds && r.end).map(r => `<span class="cal-member-tag">${r.name}</span>`).join('');
            html += `<div class="cal-cell"><span>${d}</span>${tags}</div>`;
        }
        grid.innerHTML = html;
    }

    function tick() {
        const now = new Date();
        const sun = new Date(); sun.setDate(now.getDate() + (now.getDay() === 0 ? 0 : 7 - now.getDay())); sun.setHours(24,0,0,0);
        const diff = sun - now;
        const h = String(Math.floor((diff/3600000)%24)).padStart(2,'0');
        const m = String(Math.floor((diff/60000)%60)).padStart(2,'0');
        const s = String(Math.floor((diff/1000)%60)).padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `정산까지: ${Math.floor(diff/86400000)}일 ${h}:${m}:${s}`;
    }

    function updateHeaderTitle() {
        const now = new Date();
        const wk = Math.ceil((now.getDate() + new Date(now.getFullYear(), now.getMonth(), 1).getDay()) / 7);
        document.getElementById('mainTitle').innerText = `🔥 삼영 ${now.getMonth()+1}월 ${wk}주차 🔥`;
    }

    function toggleView(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; }
    function downloadCSV() { /* CSV 다운로드 로직 동일 */ }
    function importCSV(input) { /* CSV 복구 로직 동일 */ }
    async function resetData() { if(confirm("초기화?")) await dataPath.set(null); }

    window.onload = init;
</script>
</body>
</html>
