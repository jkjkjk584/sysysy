<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>삼영건강증진회</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-lLeYST9X9X6IigV0fU8A8V6H8SUpRaqmS6/9cO5zE6G6t4qK25+P4/W5v2tW0v6" crossorigin="anonymous"></script>
    <style>
        :root { --primary: #3498db; --danger: #e74c3c; --success: #2ecc71; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; padding: 5px; background: var(--bg); color: var(--dark); margin: 0; }
        .container { max-width: 100%; margin: 0 auto; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
        
        .header-banner { background: linear-gradient(135deg, #2980b9, #2ecc71); padding: 15px 10px; border-radius: 10px; color: white; text-align: center; margin-bottom: 10px; }
        .header-banner h2 { margin: 0; font-size: 1.2rem; letter-spacing: -1px; }
        
        .timer { text-align: center; font-size: 0.82rem; color: var(--danger); font-weight: bold; margin-bottom: 8px; background: #fff5f5; padding: 6px; border-radius: 6px; border: 1px dashed var(--danger); }
        
        .week-selector { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 10px; padding: 5px; background: #f8f9fa; border-radius: 10px; }
        .day-opt { flex: 1; text-align: center; padding: 8px 0; border-radius: 8px; cursor: pointer; background: white; border: 1px solid #ddd; }
        .day-opt .d-name { font-size: 10px; color: #888; display: block; }
        .day-opt .d-num { font-size: 14px; font-weight: bold; }
        .day-opt.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .day-opt.today { border: 2px solid var(--success); }

        .admin-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        select, button { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; height: 42px; box-sizing: border-box; font-weight: bold; }
        
        button { background: var(--primary); color: white; border: none; cursor: pointer; }
        .btn-end { background: var(--danger); }

        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 480px; font-size: 12px; }
        th, td { padding: 10px 2px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; color: #666; font-size: 10px; }
        
        .day-cell-wrapper { display: flex; justify-content: center; gap: 2px; }
        .day-badge { width: 20px; height: 20px; line-height: 20px; border-radius: 50%; background: #eee; color: #aaa; font-size: 10px; font-weight: bold; transition: 0.2s; cursor: pointer; }
        .day-badge.active { background: var(--success); color: white; }

        .footer-stats { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { padding: 12px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; margin-top: 4px; }

        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; width: 85%; max-width: 300px; padding: 20px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal" id="modalContent"></div>
</div>

<div class="container">
    <div class="header-banner"><h2 id="dynamic-title">🔥 삼영건강증진회 🔥</h2></div>
    <div class="timer" id="countdown">계산 중...</div>

    <div class="week-selector" id="weekSelector"></div>
    
    <div class="admin-panel">
        <select id="nameSelect"></select>
        <div style="display: flex; gap: 5px;">
            <button onclick="processWorkout('START')">시작</button>
            <button class="btn-end" onclick="processWorkout('END')">종료</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width:30px;">순위</th>
                    <th>이름</th>
                    <th style="width:160px;">주간 현황</th>
                    <th style="width:30px;">주</th>
                    <th>벌금</th>
                    <th style="background:#fffdeb;">적립금</th>
                </tr>
            </thead>
            <tbody id="statTable"></tbody>
        </table>
    </div>

    <div class="footer-stats">
        <div class="stat-box" style="background: #fff5f5;"><span style="font-size:0.7rem;">💸 주간 벌금</span><span class="stat-val" id="totalFine" style="color:var(--danger)">0원</span></div>
        <div class="stat-box" style="background: #e8f8f5;"><span style="font-size:0.7rem;">💰 월 적립금</span><span class="stat-val" id="monthlyTotalFine" style="color:#27ae60">0원</span></div>
    </div>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none;">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHmxYjI0bp55jDuBYFFI5fA81BXx_u2Mg",
        authDomain: "samyoung-61ed1.firebaseapp.com",
        databaseURL: "https://samyoung-61ed1-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "samyoung-61ed1",
        appId: "1:967237435038:web:d2455cda50a06368cc458f"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'sy_v3'); // 깔끔한 시작을 위해 새 경로

    const KAKAO_JS_KEY = '83f27f80590a93144d2d4157d0796b27';
    Kakao.init(KAKAO_JS_KEY);

    const members = ["김재현", "김종엽", "서호진", "우은미", "이계주", "이송희", "정환균", "황재균"];
    let selectedDate = new Date().toISOString().split('T')[0];

    function init() {
        const nameSelect = document.getElementById('nameSelect');
        members.forEach(m => {
            let opt = document.createElement('option');
            opt.value = opt.text = m;
            nameSelect.appendChild(opt);
        });
        createWeekButtons();
        onValue(dbRef, (snapshot) => render(snapshot.val() || []));
        setInterval(updateTimer, 1000);
        updateTitle();
    }

    function createWeekButtons() {
        const selector = document.getElementById('weekSelector');
        const now = new Date();
        const diffToMon = (now.getDay() === 0 ? -6 : 1 - now.getDay());
        const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToMon);
        const dayNames = ['월','화','수','목','금','토','일'];

        for(let i=0; i<7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            const ds = d.toISOString().split('T')[0];
            const btn = document.createElement('div');
            btn.className = `day-opt ${ds === selectedDate ? 'selected today' : ''}`;
            btn.innerHTML = `<span class="d-name">${dayNames[i]}</span><span class="d-num">${d.getDate()}</span>`;
            btn.onclick = () => {
                document.querySelectorAll('.day-opt').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedDate = ds;
            };
            selector.appendChild(btn);
        }
    }

    window.processWorkout = async (type) => {
        const name = document.getElementById('nameSelect').value;
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ko-KR', { hour12: false });
        
        const snapshot = await get(dbRef);
        let data = snapshot.val() || [];
        let record = data.find(d => d.name === name && d.date === selectedDate);

        if (type === 'START') {
            if (record) return alert("이미 기록이 존재합니다.");
            data.push({ name, date: selectedDate, start: timeStr, end: null });
            await set(dbRef, data);
            triggerKakao(name, 'START', timeStr);
        } else {
            if (!record) return alert("시작 기록이 없습니다.");
            if (record.end) return alert("이미 종료되었습니다.");
            record.end = timeStr;
            await set(dbRef, data);
            triggerKakao(name, 'END', record.start, timeStr);
        }
    };

    function triggerKakao(name, type, t1, t2) {
        const fileInput = document.getElementById('imageInput');
        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) sendKakao(name, type, t1, t2);
        };
        alert(`인증 사진을 선택하면 카톡으로 전송됩니다!`);
        fileInput.click();
    }

    function sendKakao(name, type, t1, t2) {
        const isStart = type === 'START';
        Kakao.Share.sendDefault({
            objectType: 'feed',
            content: {
                title: isStart ? '🏋️ 운동 시작!' : '✅ 운동 완료!',
                description: isStart ? `${name}님 운동 시작\n시간: ${t1}` : `${name}님 운동 완료\n시간: ${t1} ~ ${t2}`,
                imageUrl: isStart ? 'https://cdn-icons-png.flaticon.com/512/3048/3048398.png' : 'https://cdn-icons-png.flaticon.com/512/1533/1533900.png',
                link: { mobileWebUrl: location.href, webUrl: location.href },
            },
            buttons: [{ title: '현황 보기', link: { mobileWebUrl: location.href, webUrl: location.href } }]
        });
    }

    window.showDetail = async (name, date) => {
        const snapshot = await get(dbRef);
        const data = snapshot.val() || [];
        const r = data.find(d => d.name === name && d.date === date);
        const modal = document.getElementById('modalContent');
        if (r) {
            modal.innerHTML = `<h3>${name}님 기록</h3><p>${date}</p><hr><p>시작: ${r.start}</p><p>종료: ${r.end || '진행중'}</p><button onclick="closeModal()">닫기</button>`;
        } else {
            modal.innerHTML = `<p>기록 없음</p><button onclick="closeModal()">닫기</button>`;
        }
        document.getElementById('modalOverlay').style.display = 'flex';
    };

    function render(data) {
        const now = new Date();
        const diffToMon = (now.getDay() === 0 ? -6 : 1 - now.getDay());
        const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToMon);
        monday.setHours(0,0,0,0);
        
        let html = ""; let totalWeekly = 0;
        const summary = members.map(m => {
            const weekLogs = data.filter(d => d.name === m && new Date(d.date) >= monday);
            const dBit = [0,0,0,0,0,0,0];
            weekLogs.forEach(l => { const d = new Date(l.date).getDay(); dBit[d === 0 ? 6 : d - 1] = 1; });
            const fine = (c) => (c >= 3 ? 0 : (c === 2 ? 1000 : (c === 1 ? 3000 : 5000)));
            return { name:m, count:weekLogs.length, fine: fine(weekLogs.length), dBit };
        }).sort((a,b)=>b.count-a.count || a.name.localeCompare(b.name));

        summary.forEach((s,i)=>{
            totalWeekly += s.fine;
            const dayHtml = ['월','화','수','목','금','토','일'].map((n, idx) => {
                const targetD = new Date(monday); targetD.setDate(monday.getDate() + idx);
                const ds = targetD.toISOString().split('T')[0];
                return `<div class="day-badge ${s.dBit[idx]?'active':''}" onclick="showDetail('${s.name}', '${ds}')">${n}</div>`;
            }).join('');
            html += `<tr><td>${i+1}</td><td><strong>${s.name}</strong></td><td><div class="day-cell-wrapper">${dayHtml}</div></td><td>${s.count}</td><td>${s.fine.toLocaleString()}</td><td>-</td></tr>`;
        });
        document.getElementById('statTable').innerHTML = html;
        document.getElementById('totalFine').innerText = totalWeekly.toLocaleString() + "원";
    }

    function updateTitle() {
        const now = new Date();
        const weekNum = Math.ceil((now.getDate() + new Date(now.getFullYear(), now.getMonth(), 1).getDay()) / 7);
        document.getElementById('dynamic-title').innerText = `🔥 삼영 ${now.getMonth()+1}월 ${weekNum}주차 🔥`;
    }

    function updateTimer() {
        const now = new Date();
        const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + (now.getDay()===0?1:8-now.getDay()));
        next.setHours(0,0,0,0);
        const diff = next - now;
        const h = String(Math.floor((diff / 3600000) % 24)).padStart(2, '0');
        const m = String(Math.floor((diff / 60000) % 60)).padStart(2, '0');
        const s = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
        document.getElementById('countdown').innerText = `정산까지: ${Math.floor(diff/86400000)}일 ${h}:${m}:${s}`;
    }

    window.closeModal = () => document.getElementById('modalOverlay').style.display = 'none';
    init();
</script>
</body>
</html>
