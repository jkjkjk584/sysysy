<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>삼영건강증진회 Master</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <style>
        :root { --primary: #5da3d9; --danger: #e66755; --success: #5cc97e; --bg: #f2f4f7; --text: #333; --working: #eef7ff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); -webkit-tap-highlight-color: transparent; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .header-banner { background: linear-gradient(135deg, #5da3d9, #5cc97e); padding: 15px; border-radius: 18px; color: white; text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 1rem; }
        .timer-box { border: 1px dashed var(--danger); background: #fff9f9; padding: 6px; border-radius: 12px; text-align: center; color: var(--danger); font-weight: bold; font-size: 0.75rem; margin-bottom: 12px; }

        /* 요일 선택: 글자 크기 축소 및 한 화면 고정 */
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 15px; }
        .day-card { background: #f8f9fa; border: 1px solid #eee; border-radius: 10px; padding: 8px 0; text-align: center; cursor: pointer; transition: 0.2s; }
        .day-card b { font-size: 0.7rem; display: block; line-height: 1.2; }
        .day-card span { font-size: 0.65rem; color: #999; }
        .day-card.selected { background: var(--primary); border-color: var(--primary); color: white; }
        .day-card.selected span { color: rgba(255,255,255,0.8); }
        .day-card.today { border: 1.5px solid var(--success); }

        .input-group { display: flex; gap: 6px; margin-bottom: 12px; }
        select { flex: 1.5; padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-weight: bold; font-size: 0.9rem; }
        .btn { flex: 1; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-start { background: var(--primary); }
        .btn-end { background: var(--danger); }

        .table-wrapper { overflow-x: auto; margin-bottom: 12px; border-radius: 16px; border: 1px solid #f0f0f0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 380px; }
        th { padding: 10px 4px; background: #fafafa; color: #888; }
        td { padding: 12px 4px; border-bottom: 1px solid #f9f9f9; text-align: center; }
        tr.is-working { background-color: var(--working) !important; }
        
        .day-badge { width: 20px; height: 20px; line-height: 20px; border-radius: 50%; background: #f0f0f0; color: #ccc; font-size: 8px; font-weight: bold; display: inline-block; margin: 0 1px; cursor: pointer; }
        .day-badge.active { background: var(--success); color: white; }
        .day-badge.ing { background: var(--primary); color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .summary-box { background: #f8f9fa; padding: 12px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-around; text-align: center; border: 1px solid #eee; }
        .summary-item span { font-size: 0.7rem; color: #777; }
        .summary-item b { display: block; font-size: 0.95rem; margin-top: 2px; }
        .summary-item.fine { color: var(--danger); }
        .summary-item.save { color: var(--primary); }

        .mini-menu { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .btn-mini { padding: 5px 10px; font-size: 0.7rem; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #777; cursor: pointer; }

        /* 리포트 달력 레이어 */
        .full-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #eee; border: 1px solid #eee; margin-top: 10px; }
        .cal-day-head { background: #f8f9fa; padding: 5px; text-align: center; font-size: 0.7rem; font-weight: bold; color: #999; }
        .cal-cell { background: white; min-height: 55px; padding: 4px; font-size: 0.65rem; }
        .cal-date-num { font-weight: bold; color: #ccc; margin-bottom: 2px; display: block; }
        .cal-member-tag { background: #eef7ff; color: #5da3d9; padding: 1px 2px; border-radius: 3px; display: block; margin-bottom: 1px; font-size: 0.55rem; white-space: nowrap; overflow: hidden; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 20px; width: 80%; max-width: 280px; text-align: center; }
        .modal-box input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div id="historyView" class="full-layer">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; font-size:1.1rem;">📅 운동 히스토리</h2>
        <button onclick="toggleView('historyView', false)" style="border:none; background:#eee; padding:6px 12px; border-radius:8px; font-weight:bold; font-size:0.8rem;">닫기</button>
    </div>
    <div style="margin: 12px 0; text-align: center;">
        <select id="calMonthSelect" onchange="renderCalendar()" style="padding:6px; border-radius:8px; border:1px solid #ddd; font-size:0.9rem; font-weight:bold;"></select>
    </div>
    <div class="cal-grid" id="calendarGrid"></div>
</div>

<div id="modal">
    <div class="modal-box">
        <h3 id="modalTitle" style="margin-top:0; font-size:1rem;">기록 수정</h3>
        <input type="text" id="editStart" placeholder="시작 시간">
        <input type="text" id="editEnd" placeholder="종료 시간">
        <div style="display:flex; gap:5px; margin-top:15px;">
            <button onclick="saveEdit()" style="flex:1; background:var(--primary); color:white; border:none; padding:10px; border-radius:10px; font-weight:bold;">저장</button>
            <button onclick="deleteRecord()" style="flex:1; background:var(--danger); color:white; border:none; padding:10px; border-radius:10px; font-weight:bold;">삭제</button>
        </div>
        <button onclick="closeModal()" style="margin-top:10px; border:none; background:none; color:#999; font-size:0.8rem;">취소</button>
    </div>
</div>

<div class="container">
    <div class="header-banner"><span id="mainTitle">로드 중...</span></div>
    <div class="timer-box" id="timerDisplay">D-Day 계산 중...</div>
    
    <div class="week-grid" id="weekSelector"></div>

    <div class="input-group">
        <select id="nameSelect"><option value="">이름 선택</option></select>
        <button class="btn btn-start" onclick="triggerPhoto('START')">시작</button>
        <button class="btn btn-end" onclick="triggerPhoto('END')">종료</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>순위</th><th>이름</th><th>주간 현황</th><th>회</th><th>벌금</th></tr></thead>
            <tbody id="statTable"></tbody>
        </table>
    </div>

    <div class="summary-box">
        <div class="summary-item fine"><span>주간 벌금</span><b id="totalWeekFine">0원</b></div>
        <div class="summary-item save"><span>월간 적립</span><b id="totalMonthSave">0원</b></div>
    </div>

    <div class="mini-menu">
        <button class="btn-mini" onclick="toggleView('historyView', true)">📊 리포트</button>
        <button class="btn-mini" onclick="downloadCSV()">💾 CSV 백업</button>
        <button class="btn-mini" onclick="document.getElementById('csvUpload').click()">📥 CSV 복구</button>
        <button class="btn-mini" onclick="resetData()">⚙️ 초기화</button>
    </div>
    <input type="file" id="csvUpload" accept=".csv" style="display:none;" onchange="importCSV(this)">
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none;">

<script>
    const config = {
        apiKey: "AIzaSyDHmxYjI0bp55jDuBYFFI5fA81BXx_u2Mg",
        databaseURL: "https://samyoung-61ed1-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "samyoung-61ed1"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    const dataPath = db.ref('sy_master_v12'); 

    // 카카오 초기화 체크 및 안정화
    if (!Kakao.isInitialized()) {
        try {
            Kakao.init('586678c7f1fd7c2d42c3f3b922499b65');
        } catch(e) { console.error("Kakao Init Error", e); }
    }

    const members = ["우은미", "이계주", "김재현", "김종엽", "서호진", "이송희", "정환균", "황재균"];
    let selectedDate = new Date().toISOString().split('T')[0];
    let allData = [];
    let currentEdit = null;

    function init() {
        const sel = document.getElementById('nameSelect');
        members.forEach(m => { sel.innerHTML += `<option value="${m}">${m}</option>`; });
        
        const monthSel = document.getElementById('calMonthSelect');
        for(let i=0; i<6; i++) {
            const d = new Date(); d.setMonth(d.getMonth() - i);
            const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            monthSel.innerHTML += `<option value="${val}">${d.getFullYear()}년 ${d.getMonth()+1}월</option>`;
        }

        renderWeekCards();
        updateHeaderTitle();
        dataPath.on('value', snap => {
            allData = snap.val() || [];
            renderTable(allData);
            renderCalendar();
        });
        setInterval(tick, 1000);
    }

    // 카톡 전송 함수 보강 (카카오톡 앱 실행 안정화)
    function sendKakao(name, type, time) {
        if (!Kakao.isInitialized()) return;
        const status = (type === 'START') ? "운동 시작! 🔥" : "운동 완료! 💪";
        const detail = (type === 'START') ? `시작시간: ${time}` : `기록: ${time}`;
        
        Kakao.Share.sendDefault({
            objectType: 'feed',
            content: {
                title: `🏋️ ${name}님 ${status}`,
                description: `일자: ${selectedDate}\n${detail}`,
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/3048/3048398.png',
                link: { mobileWebUrl: window.location.href, webUrl: window.location.href }
            },
            buttons: [{ title: '앱에서 확인', link: { mobileWebUrl: window.location.href, webUrl: window.location.href } }]
        });
    }

    async function handleRecord(type, name) {
        let list = [...allData];
        let idx = list.findIndex(r => r.name === name && r.date === selectedDate);
        const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        if(type === 'START') {
            if(idx > -1) return alert("이미 기록이 있습니다.");
            list.push({ name, date: selectedDate, start: time, end: "" });
            await dataPath.set(list); sendKakao(name, 'START', time);
        } else {
            if(idx === -1) return alert("시작 버튼을 먼저 눌러주세요!");
            if(list[idx].end) return alert("이미 완료된 운동입니다.");
            list[idx].end = time; await dataPath.set(list); sendKakao(name, 'END', `${list[idx].start} ~ ${time}`);
        }
    }

    function renderTable(data) {
        const now = new Date();
        const startDay = now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1);
        const monStr = new Date(new Date().setDate(startDay)).toISOString().split('T')[0];
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
        const todayStr = new Date().toISOString().split('T')[0];
        const currentDayIdx = (new Date().getDay() + 6) % 7;

        let weekFineTotal = 0;
        let monthSaveTotal = 0;

        const summary = members.map(m => {
            const wLogs = data.filter(d => d.name === m && d.date >= monStr && d.end);
            const mLogs = data.filter(d => d.name === m && d.date >= monthStart && d.end);
            const todayLog = data.find(d => d.name === m && d.date === todayStr);
            const isWorking = todayLog && todayLog.start && !todayLog.end;
            const dBit = [0,0,0,0,0,0,0];
            wLogs.forEach(l => { dBit[(new Date(l.date).getDay() + 6) % 7] = 1; });
            const cnt = wLogs.length;
            let fine = (cnt >= 3) ? 0 : (cnt === 2 ? 1000 : (cnt === 1 ? 3000 : 5000));
            weekFineTotal += fine;
            monthSaveTotal += (mLogs.length * 1000); 
            return { name: m, cnt, fine, dBit, isWorking };
        }).sort((a,b) => b.cnt - a.cnt);

        document.getElementById('totalWeekFine').innerText = weekFineTotal.toLocaleString() + "원";
        document.getElementById('totalMonthSave').innerText = monthSaveTotal.toLocaleString() + "원";

        let html = "";
        summary.forEach((s, i) => {
            const badges = ['월','화','수','목','금','토','일'].map((n, idx) => {
                let cls = "day-badge";
                if (s.dBit[idx]) cls += " active";
                else if (s.isWorking && idx === currentDayIdx) cls += " ing";
                return `<div class="${cls}" onclick="openEdit('${s.name}', ${idx})">${cls.includes('ing') ? 'ing' : n}</div>`;
            }).join('');
            html += `<tr class="${s.isWorking ? 'is-working' : ''}">
                <td>${i+1}</td><td style="font-weight:bold">${s.name}</td><td>${badges}</td><td>${s.cnt}</td><td style="color:var(--danger)">${s.fine.toLocaleString()}</td>
            </tr>`;
        });
        document.getElementById('statTable').innerHTML = html;
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthVal = document.getElementById('calMonthSelect').value;
        const [year, month] = monthVal.split('-').map(Number);
        const firstDay = new Date(year, month - 1, 1).getDay();
        const lastDate = new Date(year, month, 0).getDate();
        let html = ['일','월','화','수','목','금','토'].map(d => `<div class="cal-day-head">${d}</div>`).join('');
        for(let i=0; i<firstDay; i++) { html += `<div class="cal-cell" style="background:#fafafa"></div>`; }
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const memberTags = allData.filter(r => r.date === dateStr && r.end).map(r => `<span class="cal-member-tag">${r.name}</span>`).join('');
            html += `<div class="cal-cell"><span class="cal-date-num">${d}</span>${memberTags}</div>`;
        }
        grid.innerHTML = html;
    }

    function renderWeekCards() {
        const container = document.getElementById('weekSelector');
        const now = new Date();
        const startDay = now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1);
        const monday = new Date(new Date().setDate(startDay));
        const dayNames = ['월','화','수','목','금','토','일'];
        container.innerHTML = '';
        for(let i=0; i<7; i++) {
            const d = new Date(monday); d.setDate(monday.getDate() + i);
            const ds = d.toISOString().split('T')[0];
            const div = document.createElement('div');
            div.className = `day-card ${ds === selectedDate ? 'selected' : ''} ${ds === new Date().toISOString().split('T')[0] ? 'today' : ''}`;
            div.innerHTML = `<b>${dayNames[i]}</b><span>${d.getDate()}</span>`;
            div.onclick = () => { document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected')); div.classList.add('selected'); selectedDate = ds; };
            container.appendChild(div);
        }
    }

    function triggerPhoto(type) {
        if(!document.getElementById('nameSelect').value) return alert("이름을 선택하세요!");
        const input = document.getElementById('photoInput');
        input.onchange = () => handleRecord(type, document.getElementById('nameSelect').value);
        input.click();
    }

    function tick() {
        const now = new Date();
        const sun = new Date(); sun.setDate(now.getDate() + (now.getDay() === 0 ? 0 : 7 - now.getDay())); sun.setHours(24,0,0,0);
        const diff = sun - now;
        const h = String(Math.floor((diff/3600000)%24)).padStart(2,'0');
        const m = String(Math.floor((diff/60000)%60)).padStart(2,'0');
        const s = String(Math.floor((diff/1000)%60)).padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `정산까지: ${Math.floor(diff/86400000)}일 ${h}:${m}:${s}`;
    }

    function updateHeaderTitle() {
        const now = new Date();
        const wk = Math.ceil((now.getDate() + new Date(now.getFullYear(), now.getMonth(), 1).getDay()) / 7);
        document.getElementById('mainTitle').innerText = `🔥 삼영 ${now.getMonth()+1}월 ${wk}주차 🔥`;
    }

    async function openEdit(name, dayIdx) {
        const now = new Date();
        const startDay = now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1);
        const targetDate = new Date(new Date(now).setDate(startDay + dayIdx)).toISOString().split('T')[0];
        const record = allData.find(r => r.name === name && r.date === targetDate);
        currentEdit = { name, date: targetDate };
        document.getElementById('modalTitle').innerText = `${name} (${targetDate})`;
        document.getElementById('editStart').value = record ? record.start : "";
        document.getElementById('editEnd').value = record ? record.end : "";
        document.getElementById('modal').style.display = 'flex';
    }

    async function saveEdit() {
        let list = [...allData];
        let idx = list.findIndex(r => r.name === currentEdit.name && r.date === currentEdit.date);
        const s = document.getElementById('editStart').value, e = document.getElementById('editEnd').value;
        if(idx > -1) { list[idx].start = s; list[idx].end = e; } else { list.push({...currentEdit, start: s, end: e}); }
        await dataPath.set(list); closeModal();
    }

    async function deleteRecord() {
        if(confirm("기록을 삭제하시겠습니까?")) {
            let list = allData.filter(r => !(r.name === currentEdit.name && r.date === currentEdit.date));
            await dataPath.set(list); closeModal();
        }
    }

    function downloadCSV() {
        let csv = "\uFEFF이름,날짜,시작시간,종료시간\n";
        allData.forEach(r => { csv += `${r.name},${r.date},${r.start},${r.end}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `삼영백업_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    function importCSV(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            const rows = e.target.result.split('\n').slice(1);
            const imported = rows.filter(r => r.trim()).map(r => {
                const cols = r.split(',');
                return { name: cols[0], date: cols[1], start: cols[2], end: cols[3].trim() };
            });
            if (confirm(`${imported.length}개 데이터로 복구하시겠습니까?`)) await dataPath.set(imported);
        };
        reader.readAsText(file);
    }

    function toggleView(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    async function resetData() { if(confirm("초기화하시겠습니까?")) await dataPath.set(null); }

    window.onload = init;
</script>
</body>
</html>
